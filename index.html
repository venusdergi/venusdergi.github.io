<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ReelsPDF</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
  <script>
  window.API_BASE_URL = "https://venusdergi-github-io.onrender.com";
</script>
  <style>
    :root {
      --accent: #ff2d55;
      --glass: rgba(0,0,0,0.55);
      --muted: rgba(255,255,255,0.65);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    ::-webkit-scrollbar { display: none; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #000;
      color: white;
      height: 100vh;
      overflow: hidden;
      display: flex;
    }
    #bg-container { position: fixed; inset: 0; z-index: -1; filter: brightness(0.4) blur(10px); }
    #bg-container video, #bg-container img { width: 100%; height: 100%; object-fit: cover; }

    #auth-screen {
      position: fixed; inset: 0; z-index: 10000; background: #000;
      display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    .auth-card {
      width: 100%; max-width: 420px;
      border: 1px solid #333; border-radius: 28px;
      background: rgba(20,20,20,0.86);
      backdrop-filter: blur(20px);
      padding: 28px;
    }
    .auth-title { font-size: 22px; font-weight: 800; letter-spacing: 0.2px; }
    .auth-sub { margin-top: 6px; color: var(--muted); font-size: 13px; }
    .field { margin-top: 16px; }
    .field label { display:block; font-size: 12px; color: var(--muted); margin-bottom: 8px; }
    .field input {
      width: 100%;
      background: #0e0e0e;
      border: 1px solid #2a2a2a;
      color: #fff;
      padding: 12px 14px;
      border-radius: 14px;
      outline: none;
      font-size: 14px;
    }
    .row { display: flex; gap: 10px; margin-top: 16px; }
    .btn {
      flex: 1;
      border: 0;
      border-radius: 999px;
      padding: 12px 14px;
      font-weight: 800;
      cursor: pointer;
      font-size: 14px;
    }
    .btn.primary { background: #fff; color: #000; }
    .btn.ghost { background: rgba(255,255,255,0.08); color: #fff; border: 1px solid rgba(255,255,255,0.14); }
    .link { margin-top: 14px; font-size: 13px; color: var(--muted); text-align:center; }
    .link button { background:none; border:none; color:#0095f6; font-weight:800; cursor:pointer; }
    .error { margin-top: 12px; color: #ff6b6b; font-size: 13px; min-height: 18px; text-align:center; }

    #viewer-container { flex: 1; height: 100vh; width: 100vw; overflow-y: scroll; scroll-snap-type: y mandatory; padding-right: 0; }
    .page-wrapper { height: 100vh; display: flex; align-items: center; justify-content: center; scroll-snap-align: start; overflow: hidden; position: relative; }
    canvas {
      max-width: 95%; max-height: 90vh; object-fit: contain;
      box-shadow: 0 20px 50px rgba(0,0,0,0.8);
      border-radius: 10px;
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      cursor: zoom-in;
    }

    #actions-overlay {
      position: fixed;
      right: 14px;
      bottom: 22px;
      display: none;
      flex-direction: column;
      gap: 14px;
      z-index: 1700;
      pointer-events: none;
    }
    .action-chip {
      pointer-events: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      user-select: none;
    }
    .chip-icon {
      width: 54px;
      height: 54px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.14);
      backdrop-filter: blur(10px);
      font-size: 22px;
      transition: transform 180ms ease;
    }
    .action-chip:active .chip-icon { transform: scale(0.92); }
    .chip-count { font-size: 12px; font-weight: 900; color: rgba(255,255,255,0.92); text-shadow: 0 10px 20px rgba(0,0,0,0.8); }
    .chip-label { font-size: 10px; font-weight: 800; color: rgba(255,255,255,0.65); text-transform: uppercase; letter-spacing: 0.06em; }
    .chip-liked .chip-icon { background: rgba(255,45,85,0.22); border-color: rgba(255,45,85,0.5); box-shadow: 0 0 24px rgba(255, 45, 85, 0.35); }

    #reel-meta {
      position: fixed;
      left: 16px;
      bottom: 18px;
      max-width: min(520px, calc(100vw - 120px));
      z-index: 1200;
      background: linear-gradient(180deg, rgba(0,0,0,0.0), rgba(0,0,0,0.55));
      padding: 14px 14px;
      border-radius: 18px;
      backdrop-filter: blur(10px);
    }
    #reel-meta .title { font-weight: 900; font-size: 16px; }
    #reel-meta .desc { margin-top: 6px; font-size: 13px; color: rgba(255,255,255,0.85); line-height: 1.35; white-space: pre-wrap; }

    #topbar {
      position: fixed;
      top: 14px;
      left: 14px;
      right: 88px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      z-index: 1400;
      pointer-events: none;
    }
    .pill {
      pointer-events: auto;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 999px;
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(10px);
      color: rgba(255,255,255,0.9);
      font-size: 12px;
      font-weight: 800;
    }
    .pill button { border:0; background:none; color:#fff; cursor:pointer; font-weight:900; }

    #loadbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      z-index: 5000;
      background: rgba(255,255,255,0.06);
      display: none;
    }
    #loadbar > div {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, rgba(0,149,246,1), rgba(255,45,85,1));
      transition: width 120ms linear;
    }

    #sidebar { display: none !important; }

    .share-dropdown {
      position: absolute;
      right: 80px;
      bottom: 20px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0,0,0,0.8);
      z-index: 1600;
      min-width: 150px;
      display: none;
    }
    .share-dropdown.active { display: block; animation: slideUp 0.3s ease; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .share-option { padding: 12px 16px; cursor: pointer; border-bottom: 1px solid #222; transition: background 0.2s; font-size: 13px; }
    .share-option:last-child { border-bottom: none; }
    .share-option:hover { background: rgba(255,255,255,0.1); }

    #comment-drawer {
      position: fixed;
      right: -450px;
      top: 0;
      width: 400px;
      max-width: 80vw;
      height: 100vh;
      background: #121212;
      z-index: 2000;
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      border-left: 1px solid #333;
    }
    #comment-drawer.active { transform: translateX(-450px); }
    .drawer-header { padding: 20px; border-bottom: 1px solid #222; text-align: center; font-weight: 800; }
    .comment-list { flex: 1; overflow-y: auto; padding: 20px; }
    .insta-comment { display: flex; gap: 12px; margin-bottom: 20px; }
    .avatar { width: 35px; height: 35px; border-radius: 50%; background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
    .comment-content b { font-size: 13px; margin-right: 5px; }
    .comment-content p { font-size: 13px; color: #efefef; line-height: 1.4; }
    .comment-time { font-size: 11px; color: #666; margin-top: 4px; }

    .insta-input { padding: 20px; border-top: 1px solid #222; display: flex; gap: 10px; background: #121212; }
    .insta-input input {
      flex: 1;
      background: #262626;
      border: 1px solid #363636;
      padding: 12px 16px;
      border-radius: 25px;
      color: white;
      outline: none;
      font-size: 14px;
    }

    .heart-pop {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      color: var(--accent);
      font-size: 120px;
      pointer-events: none;
      z-index: 5000;
      animation: heartAnim 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }
    @keyframes heartAnim {
      0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
      40% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; }
    }

    .ig-heart {
      position: fixed;
      width: 140px;
      height: 140px;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%) scale(0.6);
      opacity: 0;
      pointer-events: none;
      z-index: 5500;
      filter: drop-shadow(0 18px 50px rgba(0,0,0,0.65));
      animation: igHeart 900ms cubic-bezier(0.2, 0.9, 0.2, 1) forwards;
    }
    .ig-heart svg { width: 100%; height: 100%; }
    @keyframes igHeart {
      0% { transform: translate(-50%, -50%) scale(0.35); opacity: 0; }
      18% { transform: translate(-50%, -50%) scale(1.08); opacity: 1; }
      55% { transform: translate(-50%, -50%) scale(0.95); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(1.25); opacity: 0; }
    }

    .burst-dot {
      position: fixed;
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: rgba(255,255,255,0.95);
      pointer-events: none;
      z-index: 5600;
      animation: burst 520ms ease-out forwards;
    }
    @keyframes burst {
      0% { transform: translate(0,0) scale(1); opacity: 1; }
      100% { transform: translate(var(--dx), var(--dy)) scale(0.1); opacity: 0; }
    }

    #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; z-index: 1500; }

    body.light-mode { background: #f5f5f5; color: #000; }
    body.light-mode #sidebar { background: rgba(255,255,255,0.4); }
    body.light-mode .icon-circle { background: rgba(0,0,0,0.1); }
    body.light-mode #comment-drawer { background: #fff; }
    body.light-mode .drawer-header { border-bottom-color: #eee; }
    body.light-mode .insta-input { background: #fff; border-top-color: #eee; }
    body.light-mode .insta-input input { background: #f5f5f5; border-color: #ddd; color: #000; }
    body.light-mode .comment-content p { color: #000; }
    body.light-mode .share-dropdown { background: #fff; border-color: #ddd; }
    body.light-mode .share-option { border-bottom-color: #eee; }
    body.light-mode canvas { box-shadow: 0 20px 50px rgba(0,0,0,0.2); }

    @media (max-width: 560px) {
      #reel-meta { max-width: calc(100vw - 96px); }
      #topbar { right: 70px; }
    }
  </style>
</head>
<body>
  <div id="bg-container">
    <video autoplay muted loop playsinline>
      <source src="https://assets.mixkit.co/videos/preview/mixkit-abstract-motion-of-colors-32665-large.mp4" type="video/mp4">
    </video>
  </div>

  <div id="auth-screen">
    <div class="auth-card">
      <div class="auth-title" id="auth-title">Giriş Yap</div>
      <div class="auth-sub" id="auth-sub">ReelsPDF’leri görmek için hesabına giriş yap.</div>

      <div class="field">
        <label for="email">E-posta</label>
        <input id="email" type="email" autocomplete="email" placeholder="ornek@mail.com" />
      </div>
      <div class="field">
        <label for="password">Şifre</label>
        <input id="password" type="password" autocomplete="current-password" placeholder="En az 6 karakter" />
      </div>

      <div class="row">
        <button class="btn primary" id="submit-btn" onclick="submitAuth()">Giriş</button>
        <button class="btn ghost" onclick="continueAsGuest()">Misafir</button>
      </div>

      <div class="row">
        <button class="btn ghost" onclick="goAdmin()">Admin Panel</button>
      </div>

      <div class="link">
        <span id="switch-text">Hesabın yok mu?</span>
        <button id="switch-btn" onclick="toggleMode()">Kayıt Ol</button>
      </div>

      <div class="error" id="auth-error"></div>
    </div>
  </div>

  <div id="overlay" onclick="closeComments()"></div>

  <div id="loadbar"><div id="loadbar-fill"></div></div>

  <div id="topbar">
    <div class="pill" id="user-pill" style="display:none;">
      <span id="user-email"></span>
      <button onclick="logout()">Çıkış</button>
    </div>
    <div class="pill" id="reel-pill" style="display:none;">
      <span id="reel-count"></span>
    </div>
  </div>

  <div id="viewer-container"></div>

  <div id="reel-meta" style="display:none;">
    <div class="title" id="reel-title"></div>
    <div class="desc" id="reel-desc"></div>
  </div>

  <div id="actions-overlay">
    <div class="action-chip" id="like-chip" onclick="toggleLike()">
      <div class="chip-icon">❤️</div>
      <div class="chip-count" id="like-count">0</div>
      <div class="chip-label">Beğen</div>
    </div>
    <div class="action-chip" onclick="openComments()">
      <div class="chip-icon">💬</div>
      <div class="chip-count" id="c-count">0</div>
      <div class="chip-label">Yorum</div>
    </div>
    <div class="action-chip" onclick="toggleShare(event)">
      <div class="chip-icon">📤</div>
      <div class="chip-label">Paylaş</div>
    </div>
    <div class="action-chip" onclick="downloadPage()">
      <div class="chip-icon">⬇️</div>
      <div class="chip-label">İndir</div>
    </div>
    <div class="action-chip" onclick="toggleTheme()">
      <div class="chip-icon" id="theme-icon">🌙</div>
      <div class="chip-label">Tema</div>
    </div>
  </div>

  <div class="share-dropdown" id="share-dropdown">
    <div class="share-option" onclick="shareToWhatsApp()">WhatsApp</div>
    <div class="share-option" onclick="shareToTwitter()">Twitter/X</div>
    <div class="share-option" onclick="shareToFacebook()">Facebook</div>
    <div class="share-option" onclick="copyLink()">Linki Kopyala</div>
  </div>

  <div id="comment-drawer">
    <div class="drawer-header">Yorumlar</div>
    <div class="comment-list" id="comment-list"></div>
    <div class="insta-input">
      <input type="text" id="c-input" placeholder="Yorum ekle..." />
      <button onclick="addComment()" style="background:none; border:none; color:#0095f6; font-weight:800; cursor:pointer;">Paylaş</button>
    </div>
  </div>

  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    const viewer = document.getElementById('viewer-container');
    const db = {}; // likes/comments (persisted)
    let activePage = 1;
    let lastTap = 0;
    let currentPdf = null;
    let isDarkMode = true;

    let authMode = 'login'; // login | register
    let reels = [];
    let activeReel = null;
    let isGuest = false;

    const loadbar = document.getElementById('loadbar');
    const loadbarFill = document.getElementById('loadbar-fill');
    let loadbarTimer = null;

    const API_BASE_URL = (window.API_BASE_URL || '').replace(/\/$/, '');
    const STORAGE_TOKEN_KEY = 'reelspdf_token';
    const STORAGE_REACTIONS_KEY = 'reelspdf_reactions_v1';

    const reactionsCache = {};
    const commentsCache = {};

    function apiUrl(path) {
      if (!API_BASE_URL) return path;
      return `${API_BASE_URL}${path}`;
    }

    function getToken() {
      return localStorage.getItem(STORAGE_TOKEN_KEY);
    }

    function authHeaders() {
      const token = getToken();
      if (!token) return {};
      return { Authorization: `Bearer ${token}` };
    }

    function setToken(token) {
      if (!token) return;
      localStorage.setItem(STORAGE_TOKEN_KEY, token);
    }

    function reactionsKey(reelId, page) {
      return `${reelId || 'x'}:${page || 1}`;
    }

    function loadReactions() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_REACTIONS_KEY) || '{}') || {};
      } catch {
        return {};
      }
    }

    function saveReactions(allReactions) {
      try {
        localStorage.setItem(STORAGE_REACTIONS_KEY, JSON.stringify(allReactions || {}));
      } catch {}
    }

    function getPageData() {
      const reelId = activeReel ? activeReel.id : 'x';
      const k = reactionsKey(reelId, activePage);
      if (!db[k]) {
        const all = loadReactions();
        db[k] = all[k] || { likes: 0, liked: false, comments: [] };
      }
      return db[k];
    }

    function persistPageData() {
      const reelId = activeReel ? activeReel.id : 'x';
      const k = reactionsKey(reelId, activePage);
      const all = loadReactions();
      all[k] = db[k] || { likes: 0, liked: false, comments: [] };
      saveReactions(all);
    }

    async function fetchReactions(reelId, page) {
      const k = reactionsKey(reelId, page);
      if (reactionsCache[k]) return reactionsCache[k];

      try {
        const res = await fetch(apiUrl(`/api/reels/${reelId}/pages/${page}/reactions`), {
          headers: { ...authHeaders() }
        });
        if (!res.ok) throw new Error('bad');
        const data = await res.json();
        reactionsCache[k] = data;
        return data;
      } catch {
        const local = loadReactions();
        const v = local[k] || { likes: 0, liked: false };
        reactionsCache[k] = v;
        return v;
      }
    }

    async function fetchComments(reelId, page) {
      const k = reactionsKey(reelId, page);
      if (commentsCache[k]) return commentsCache[k];
      try {
        const res = await fetch(apiUrl(`/api/reels/${reelId}/pages/${page}/comments`));
        if (!res.ok) throw new Error('bad');
        const data = await res.json();
        commentsCache[k] = data.comments || [];
        return commentsCache[k];
      } catch {
        const local = loadReactions();
        const v = (local[k] && local[k].comments) ? local[k].comments : [];
        commentsCache[k] = v;
        return v;
      }
    }

    function startLoadbar() {
      if (loadbarTimer) clearInterval(loadbarTimer);
      loadbar.style.display = 'block';
      loadbarFill.style.width = '8%';
      let p = 8;
      loadbarTimer = setInterval(() => {
        p = Math.min(92, p + Math.max(0.4, (92 - p) * 0.06));
        loadbarFill.style.width = `${p}%`;
      }, 140);
    }

    function setLoadbarProgress(pct) {
      const p = Math.max(0, Math.min(100, pct));
      loadbar.style.display = 'block';
      loadbarFill.style.width = `${p}%`;
    }

    function stopLoadbar() {
      if (loadbarTimer) clearInterval(loadbarTimer);
      loadbarTimer = null;
      loadbarFill.style.width = '100%';
      setTimeout(() => {
        loadbar.style.display = 'none';
        loadbarFill.style.width = '0%';
      }, 220);
    }

    function setAuthError(msg) {
      document.getElementById('auth-error').innerText = msg || '';
    }

    function toggleMode() {
      authMode = (authMode === 'login') ? 'register' : 'login';
      document.getElementById('auth-title').innerText = authMode === 'login' ? 'Giriş Yap' : 'Kayıt Ol';
      document.getElementById('auth-sub').innerText = authMode === 'login'
        ? 'ReelsPDF’leri görmek için hesabına giriş yap.'
        : 'ReelsPDF için hesap oluştur.';
      document.getElementById('submit-btn').innerText = authMode === 'login' ? 'Giriş' : 'Kayıt';
      document.getElementById('switch-text').innerText = authMode === 'login' ? 'Hesabın yok mu?' : 'Zaten hesabın var mı?';
      document.getElementById('switch-btn').innerText = authMode === 'login' ? 'Kayıt Ol' : 'Giriş Yap';
      setAuthError('');
    }

    function goAdmin() {
      window.location.href = '/admin.html';
    }

    async function continueAsGuest() {
      isGuest = true;
      document.getElementById('user-email').innerText = 'Misafir';
      document.getElementById('user-pill').style.display = 'inline-flex';
      await loadReelsAndShow();
    }

    async function submitAuth() {
      try {
        setAuthError('');
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        if (!email || !password) return setAuthError('E-posta ve şifre gerekli.');

        const endpoint = authMode === 'login' ? '/api/auth/login' : '/api/auth/register';
        const res = await fetch(apiUrl(endpoint), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          if (data.error === 'user_not_found') return setAuthError('Bu e-posta ile kayıt bulunamadı. Kayıt olmayı dene.');
          if (data.error === 'wrong_password') return setAuthError('Şifre yanlış. Tekrar dene.');
          if (data.error === 'email_taken') return setAuthError('Bu e-posta zaten kayıtlı. Giriş yapmayı dene.');
          return setAuthError(data.error || 'Hata oluştu.');
        }

        setToken(data.token);

        await boot();
      } catch (e) {
        setAuthError('Sunucuya bağlanılamadı.');
      }
    }

    async function logout() {
      localStorage.removeItem(STORAGE_TOKEN_KEY);
      await fetch(apiUrl('/api/auth/logout'), { method: 'POST' }).catch(() => {});
      location.reload();
    }

    function showAppUI() {
      document.getElementById('auth-screen').style.display = 'none';
      document.getElementById('actions-overlay').style.display = 'flex';
      document.getElementById('reel-meta').style.display = 'block';
      document.getElementById('user-pill').style.display = 'inline-flex';
      document.getElementById('reel-pill').style.display = 'inline-flex';
    }

    async function loadReelsAndShow() {
      startLoadbar();
      const reelsRes = await fetch(apiUrl('/api/reels'));
      if (!reelsRes.ok) { stopLoadbar(); return; }
      const payload = await reelsRes.json();
      reels = payload.reels || [];

      showAppUI();
      document.getElementById('reel-count').innerText = `${reels.length} reels`;

      if (!reels.length) {
        stopLoadbar();
        document.getElementById('reel-title').innerText = 'Henüz reels yok';
        document.getElementById('reel-desc').innerText = 'Admin panelinden PDF yükleyince burada görünecek.';
        return;
      }

      await loadReel(reels[0]);
      stopLoadbar();
    }

    async function boot() {
      const token = getToken();
      if (!token) return;

      const meRes = await fetch(apiUrl('/api/me'), {
        headers: { Authorization: `Bearer ${token}` }
      });
      if (!meRes.ok) {
        localStorage.removeItem(STORAGE_TOKEN_KEY);
        return;
      }
      const me = await meRes.json();
      document.getElementById('user-email').innerText = me.email;
      await loadReelsAndShow();
    }

    async function loadReel(reel) {
      activeReel = reel;
      document.getElementById('reel-title').innerText = reel.title || '';
      document.getElementById('reel-desc').innerText = reel.description || '';

      viewer.innerHTML = '';
      activePage = 1;
      updateUIState();

      startLoadbar();
      const pdfTask = pdfjsLib.getDocument({ url: reel.pdf_url, disableAutoFetch: false, disableStream: false });
      pdfTask.onProgress = (p) => {
        if (!p || !p.total) return;
        const pct = (p.loaded / p.total) * 75;
        setLoadbarProgress(Math.max(8, Math.min(75, pct)));
      };
      const pdf = await pdfTask.promise;
      currentPdf = pdf;

      for (let i = 1; i <= pdf.numPages; i++) {
        const wrapper = document.createElement('div');
        wrapper.className = 'page-wrapper';
        wrapper.dataset.id = i;
        wrapper.dataset.rendered = '0';
        viewer.appendChild(wrapper);
        observer.observe(wrapper);
      }

      await renderAround(activePage);
      setLoadbarProgress(100);
      stopLoadbar();
      await syncPageFromBackend();
    }

    async function syncPageFromBackend() {
      if (!activeReel) return;
      const reelId = activeReel.id;
      const page = activePage;
      const k = reactionsKey(reelId, page);

      const [rx, cmts] = await Promise.all([
        fetchReactions(reelId, page),
        fetchComments(reelId, page)
      ]);

      db[k] = db[k] || { likes: 0, liked: false, comments: [] };
      db[k].likes = Number(rx.likes || 0);
      db[k].liked = !!rx.liked;
      db[k].comments = Array.isArray(cmts) ? cmts.map(c => ({
        user: c.user || 'kullanici',
        text: c.text || '',
        time: c.created_at ? new Date(c.created_at).toLocaleString('tr-TR', { hour: '2-digit', minute: '2-digit', day: '2-digit', month: '2-digit' }) : 'Şimdi'
      })) : [];

      persistPageData();
      updateUIState();
      renderComments();
    }

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          activePage = parseInt(e.target.dataset.id);
          updateUIState();
          renderAround(activePage);
          syncPageFromBackend();
        }
      });
    }, { threshold: 0.6 });

    async function renderAround(center) {
      if (!currentPdf) return;
      const start = Math.max(1, center - 1);
      const end = Math.min(currentPdf.numPages, center + 2);
      for (let i = start; i <= end; i++) {
        const wrapper = viewer.querySelector(`.page-wrapper[data-id="${i}"]`);
        if (!wrapper) continue;
        if (wrapper.dataset.rendered === '1') continue;
        wrapper.dataset.rendered = '1';
        await renderPage(currentPdf, i, wrapper);
      }
    }

    async function renderPage(pdf, num, container) {
      const page = await pdf.getPage(num);
      const viewport = page.getViewport({ scale: 1.25 });
      const canvas = document.createElement('canvas');
      canvas.height = viewport.height;
      canvas.width = viewport.width;
      await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
      canvas.addEventListener('click', (e) => handleSmartZoom(e, canvas));
      container.appendChild(canvas);
    }

    function handleSmartZoom(e, canvas) {
      const now = Date.now();
      if (now - lastTap < 300) {
        const rect = canvas.getBoundingClientRect();
        const x = ((e.clientX - rect.left) / rect.width) * 100;
        const y = ((e.clientY - rect.top) / rect.height) * 100;

        if (canvas.style.transform === 'scale(2.5)') {
          canvas.style.transform = 'scale(1)';
        } else {
          canvas.style.transformOrigin = `${x}% ${y}%`;
          canvas.style.transform = 'scale(2.5)';
        }
      }
      lastTap = now;
    }

    function toggleTheme() {
      isDarkMode = !isDarkMode;
      document.body.classList.toggle('light-mode');
      document.getElementById('theme-icon').innerText = isDarkMode ? '🌙' : '☀️';
    }

    function toggleShare(e) {
      e.stopPropagation();
      document.getElementById('share-dropdown').classList.toggle('active');
    }

    function shareToWhatsApp() {
      const msg = `ReelsPDF - Sayfa ${activePage} - Birlikte göz at!`;
      window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
    }

    function shareToTwitter() {
      const msg = `ReelsPDF'de sayfa ${activePage} çok güzel! 📄 #ReelsPDF`;
      window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(msg)}`);
    }

    function shareToFacebook() {
      window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(window.location.href)}`);
    }

    function copyLink() {
      navigator.clipboard.writeText(window.location.href);
      alert('Link kopyalandı! ✓');
      document.getElementById('share-dropdown').classList.remove('active');
    }

    function downloadPage() {
      const canvases = document.querySelectorAll('canvas');
      canvases.forEach((canvas) => {
        const wrapper = canvas.closest('.page-wrapper');
        if (wrapper.dataset.id == activePage) {
          const link = document.createElement('a');
          link.href = canvas.toDataURL('image/png');
          link.download = `ReelsPDF-Sayfa-${activePage}.png`;
          link.click();
        }
      });
    }

    function toggleLike() {
      if (isGuest) return;
      const pageData = getPageData();
      if (!activeReel) return;
      const reelId = activeReel.id;
      const page = activePage;

      // optimistic
      const prevLiked = pageData.liked;
      pageData.liked = !pageData.liked;
      pageData.likes += pageData.liked ? 1 : -1;
      updateUIState();
      persistPageData();

      if (pageData.liked) fireHeartOverlay();

      fetch(apiUrl(`/api/reels/${reelId}/pages/${page}/like`), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', ...authHeaders() }
      })
        .then(r => r.json().catch(() => ({})).then(j => ({ ok: r.ok, j })))
        .then(({ ok, j }) => {
          if (!ok) throw new Error('bad');
          pageData.likes = Number(j.likes || pageData.likes);
          pageData.liked = !!j.liked;
          const k = reactionsKey(reelId, page);
          reactionsCache[k] = { likes: pageData.likes, liked: pageData.liked };
          persistPageData();
          updateUIState();
        })
        .catch(() => {
          // rollback
          pageData.liked = prevLiked;
          pageData.likes += prevLiked ? 1 : -1;
          persistPageData();
          updateUIState();
        });
    }

    function updateUIState() {
      const pageData = getPageData();
      const likeChip = document.getElementById('like-chip');
      likeChip.classList.toggle('chip-liked', pageData.liked);
      document.getElementById('like-count').innerText = pageData.likes;
      document.getElementById('c-count').innerText = (pageData.comments || []).length;
    }

    function fireHeartOverlay() {
      const el = document.createElement('div');
      el.className = 'ig-heart';
      el.innerHTML = `
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 21s-7.2-4.6-9.6-8.5C.4 9 2.4 5.5 6.2 5.2c2.1-.2 3.6 1 4.6 2.2 1-1.2 2.5-2.4 4.6-2.2 3.8.3 5.8 3.8 3.8 7.3C19.2 16.4 12 21 12 21Z" fill="#ff2d55"/>
        </svg>
      `;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 950);

      // small burst
      const cx = window.innerWidth - 41;
      const cy = window.innerHeight - 170;
      for (let i = 0; i < 8; i++) {
        const d = document.createElement('div');
        d.className = 'burst-dot';
        d.style.left = `${cx}px`;
        d.style.top = `${cy}px`;
        const ang = (Math.PI * 2 * i) / 8;
        const dist = 18 + Math.random() * 22;
        d.style.setProperty('--dx', `${Math.cos(ang) * dist}px`);
        d.style.setProperty('--dy', `${Math.sin(ang) * dist}px`);
        document.body.appendChild(d);
        setTimeout(() => d.remove(), 560);
      }
    }

    function openComments() {
      document.getElementById('comment-drawer').classList.add('active');
      document.getElementById('overlay').style.display = 'block';
      renderComments();
    }

    function closeComments() {
      document.getElementById('comment-drawer').classList.remove('active');
      document.getElementById('overlay').style.display = 'none';
    }

    function addComment() {
      if (isGuest) return;
      const input = document.getElementById('c-input');
      if (!input.value.trim()) return;

      if (!activeReel) return;
      const reelId = activeReel.id;
      const page = activePage;
      const text = input.value.trim();

      const pageData = getPageData();

      // optimistic
      pageData.comments.push({ user: 'sen', text, time: 'Şimdi' });
      input.value = '';
      persistPageData();
      updateUIState();
      renderComments();

      fetch(apiUrl(`/api/reels/${reelId}/pages/${page}/comments`), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', ...authHeaders() },
        body: JSON.stringify({ text })
      })
        .then(r => r.json().catch(() => ({})).then(j => ({ ok: r.ok, j })))
        .then(({ ok, j }) => {
          if (!ok) throw new Error('bad');
          commentsCache[reactionsKey(reelId, page)] = null;
          return syncPageFromBackend();
        })
        .catch(() => {
          // fallback: just refresh from backend
          syncPageFromBackend();
        });
    }

    function renderComments() {
      const list = document.getElementById('comment-list');
      list.innerHTML = '';
      const pageData = getPageData();
      const comments = pageData.comments || [];

      comments.forEach(c => {
        const div = document.createElement('div');
        div.className = 'insta-comment';
        div.innerHTML = `
          <div class="avatar"></div>
          <div class="comment-content">
            <p><b>${c.user}</b>${c.text}</p>
            <div class="comment-time">${c.time}</div>
          </div>
        `;
        list.appendChild(div);
      });
      list.scrollTop = list.scrollHeight;

      const input = document.getElementById('c-input');
      input.disabled = isGuest;
      input.placeholder = isGuest ? 'Misafir modunda yorum yazılamaz.' : 'Yorum ekle...';
    }

    document.addEventListener('click', (e) => {
      if (!e.target.closest('.action-btn')) {
        document.getElementById('share-dropdown').classList.remove('active');
      }
    });

    (async () => {
      await boot();
      if (!getToken()) {
        // Token yoksa ya da geçersizse misafir gibi devam edilebilir.
        // Kullanıcı isterse login/register yapar.
      }
    })();
  </script>
