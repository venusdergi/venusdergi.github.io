<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ReelsPDF Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
  window.API_BASE_URL = "https://venusdergi-github-io.onrender.com";
</script>
  <style>
    :root { --accent:#ff2d55; --muted: rgba(255,255,255,0.7); }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background:#000;
      color:#fff;
      min-height:100vh;
      padding: 24px;
    }
    .shell { max-width: 1100px; margin: 0 auto; }
    .grid { display: grid; grid-template-columns: 1fr; gap: 16px; }
    @media (min-width: 980px) { .grid { grid-template-columns: 1fr 420px; align-items: start; } }
    .card {
      width: 100%;
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 22px;
      background: rgba(18,18,18,0.82);
      backdrop-filter: blur(18px);
      padding: 18px;
      box-shadow: 0 18px 60px rgba(0,0,0,0.55);
    }
    .title { font-size: 18px; font-weight: 900; }
    .sub { margin-top: 6px; font-size: 13px; color: var(--muted); }
    .topbar { display:flex; justify-content: space-between; align-items: center; gap: 12px; }
    .pill { display:inline-flex; align-items:center; gap: 10px; padding: 10px 12px; border-radius: 999px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.10); color: rgba(255,255,255,0.9); font-size: 12px; font-weight: 800; }
    .pill a { color:#fff; text-decoration:none; font-weight: 900; }
    .field { margin-top: 16px; }
    .field label { display:block; font-size: 12px; color: var(--muted); margin-bottom: 8px; }
    .field input, .field textarea {
      width:100%;
      background:#0e0e0e;
      border: 1px solid #2a2a2a;
      color:#fff;
      padding: 12px 14px;
      border-radius: 14px;
      outline:none;
      font-size: 14px;
    }
    textarea { resize: vertical; min-height: 92px; }
    .row { display:flex; gap: 10px; margin-top: 16px; }
    .btn {
      flex: 1;
      border: 0;
      border-radius: 999px;
      padding: 12px 14px;
      font-weight: 900;
      cursor:pointer;
      font-size: 14px;
    }
    .btn.primary { background:#fff; color:#000; }
    .btn.ghost { background: rgba(255,255,255,0.08); color: #fff; border: 1px solid rgba(255,255,255,0.14); }
    .btn.danger { background: rgba(255,45,85,0.15); color: #fff; border: 1px solid rgba(255,45,85,0.35); }
    .error { margin-top: 12px; color: #ff6b6b; font-size: 13px; min-height: 18px; text-align:center; }
    .ok { margin-top: 12px; color: #4cd964; font-size: 13px; min-height: 18px; text-align:center; }
    .sep { height: 1px; background: rgba(255,255,255,0.1); margin: 18px 0; }

    .table { width:100%; border-collapse: collapse; margin-top: 12px; overflow:hidden; border-radius: 16px; }
    .table th, .table td { padding: 12px 12px; border-bottom: 1px solid rgba(255,255,255,0.08); text-align:left; font-size: 13px; }
    .table th { font-size: 12px; color: rgba(255,255,255,0.7); font-weight: 900; text-transform: uppercase; letter-spacing: 0.08em; }
    .table tr:hover td { background: rgba(255,255,255,0.03); }
    .muted { color: rgba(255,255,255,0.65); }
    .actions { display:flex; gap: 10px; align-items:center; justify-content: flex-end; }
    .tiny { font-size: 12px; padding: 10px 12px; }
    .right { text-align:right; }
  </style>
</head>
<body>
  <div class="shell">
    <div class="topbar" style="margin-bottom: 14px;">
      <div>
        <div class="title">Admin Dashboard</div>
        <div class="sub">PDF Reels yükle, listele ve sil.</div>
      </div>
      <div class="pill">
        <a href="/" onclick="goHome(); return false;">Ana Sayfa</a>
      </div>
    </div>

    <div class="grid">
      <div class="card" id="list-card" style="display:none;">
        <div class="topbar">
          <div>
            <div class="title" style="font-size:16px;">Yüklenen Reels</div>
            <div class="sub" id="reels-sub">0 adet</div>
          </div>
          <div class="actions">
            <button class="btn ghost tiny" onclick="refreshReels()">Yenile</button>
            <button class="btn danger tiny" onclick="adminLogout()">Çıkış</button>
          </div>
        </div>

        <table class="table" aria-label="Reels listesi">
          <thead>
            <tr>
              <th>Başlık</th>
              <th class="right">Tarih</th>
              <th class="right">İşlem</th>
            </tr>
          </thead>
          <tbody id="reels-tbody">
            <tr><td colspan="3" class="muted">Yükleniyor...</td></tr>
          </tbody>
        </table>
        <div class="error" id="list-error"></div>
        <div class="ok" id="list-ok"></div>
      </div>

      <div class="card">
        <div id="login-area">
          <div class="title" style="font-size:16px;">Admin Girişi</div>
          <div class="sub">Sabit admin bilgileri ile giriş yap.</div>
          <div class="field">
            <label for="email">Admin e-posta</label>
            <input id="email" type="email" placeholder="admin@example.com" />
          </div>
          <div class="field">
            <label for="password">Admin şifre</label>
            <input id="password" type="password" placeholder="***" />
          </div>
          <div class="row">
            <button class="btn primary" onclick="adminLogin()">Giriş</button>
            <button class="btn ghost" onclick="goHome()">Ana Sayfa</button>
          </div>
          <div class="error" id="login-error"></div>
        </div>

        <div id="upload-area" style="display:none;">
          <div class="title" style="font-size:16px;">Yeni Reels Yükle</div>
          <div class="sub">Başlık + açıklama + PDF seç.</div>
          <div class="sep"></div>

          <div class="field">
            <label for="title">Başlık</label>
            <input id="title" type="text" maxlength="80" placeholder="Örn: Ders Notları - 1" />
          </div>
          <div class="field">
            <label for="description">Açıklama</label>
            <textarea id="description" maxlength="500" placeholder="Instagram tarzı açıklama...\n#etiket"></textarea>
          </div>
          <div class="field">
            <label for="pdf">PDF</label>
            <input id="pdf" type="file" accept="application/pdf" />
          </div>

          <div class="row">
            <button class="btn primary" onclick="uploadReel()">Yükle</button>
            <button class="btn ghost" onclick="refreshReels()">Listeyi Güncelle</button>
          </div>

          <div class="error" id="upload-error"></div>
          <div class="ok" id="upload-ok"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE_URL = (window.API_BASE_URL || '').replace(/\/$/, '');
    const ADMIN_TOKEN_KEY = 'reelspdf_admin_token';

    function apiUrl(path) {
      if (!API_BASE_URL) return path;
      return `${API_BASE_URL}${path}`;
    }

    function setAdminToken(token) {
      if (!token) return;
      localStorage.setItem(ADMIN_TOKEN_KEY, token);
    }

    function getAdminToken() {
      return localStorage.getItem(ADMIN_TOKEN_KEY);
    }

    function setLoginError(msg) { document.getElementById('login-error').innerText = msg || ''; }
    function setUploadError(msg) { document.getElementById('upload-error').innerText = msg || ''; }
    function setUploadOk(msg) { document.getElementById('upload-ok').innerText = msg || ''; }
    function setListError(msg) { document.getElementById('list-error').innerText = msg || ''; }
    function setListOk(msg) { document.getElementById('list-ok').innerText = msg || ''; }

    function goHome() { window.location.href = '/'; }

    async function adminLogin() {
      try {
        setLoginError('');
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const res = await fetch(apiUrl('/api/admin/login'), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) return setLoginError(data.error || 'Giriş başarısız');

        setAdminToken(data.token);
        document.getElementById('login-area').style.display = 'none';
        document.getElementById('upload-area').style.display = 'block';
        document.getElementById('list-card').style.display = 'block';
        await refreshReels();
      } catch (e) {
        setLoginError('Sunucuya bağlanılamadı.');
      }
    }

    async function adminLogout() {
      localStorage.removeItem(ADMIN_TOKEN_KEY);
      await fetch(apiUrl('/api/auth/logout'), { method: 'POST' }).catch(() => {});
      location.reload();
    }

    function fmtDate(iso) {
      try {
        const d = new Date(iso);
        if (Number.isNaN(d.getTime())) return '';
        return d.toLocaleString('tr-TR', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
      } catch {
        return '';
      }
    }

    function escapeHtml(s) {
      return String(s || '').replace(/[&<>"]+/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c] || c));
    }

    async function refreshReels() {
      try {
        setListError('');
        setListOk('');

        const token = getAdminToken();
        if (!token) return;

        const res = await fetch(apiUrl('/api/admin/reels'), {
          headers: { Authorization: `Bearer ${token}` }
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) return setListError(data.error || 'Liste alınamadı');

        const rows = data.reels || [];
        document.getElementById('reels-sub').innerText = `${rows.length} adet`;

        const tbody = document.getElementById('reels-tbody');
        if (!rows.length) {
          tbody.innerHTML = '<tr><td colspan="3" class="muted">Henüz reels yok.</td></tr>';
          return;
        }

        tbody.innerHTML = rows.map(r => {
          const title = escapeHtml(r.title);
          const date = escapeHtml(fmtDate(r.created_at));
          return `
            <tr>
              <td>
                <div style="font-weight:900;">${title}</div>
                <div class="muted" style="margin-top:4px; line-height:1.35;">${escapeHtml(r.description || '')}</div>
              </td>
              <td class="right"><span class="muted">${date}</span></td>
              <td class="right">
                <div class="actions">
                  <button class="btn danger tiny" onclick="deleteReel(${r.id})">Sil</button>
                </div>
              </td>
            </tr>
          `;
        }).join('');
      } catch (e) {
        setListError('Sunucuya bağlanılamadı.');
      }
    }

    async function deleteReel(id) {
      try {
        setListError('');
        setListOk('');
        const token = getAdminToken();
        if (!token) return setListError('Önce admin giriş yapmalısın.');

        const ok = confirm('Bu reels silinsin mi? PDF de Supabase’den silinir.');
        if (!ok) return;

        const res = await fetch(apiUrl(`/api/admin/reels/${id}`), {
          method: 'DELETE',
          headers: { Authorization: `Bearer ${token}` }
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) return setListError(data.error || 'Silme başarısız');

        setListOk('Silindi.');
        await refreshReels();
      } catch (e) {
        setListError('Sunucuya bağlanılamadı.');
      }
    }

    async function uploadReel() {
      try {
        setUploadError('');
        setUploadOk('');

        const title = document.getElementById('title').value.trim();
        const description = document.getElementById('description').value;
        const file = document.getElementById('pdf').files[0];

        if (!title) return setUploadError('Başlık zorunlu.');
        if (!file) return setUploadError('PDF seçmelisin.');

        const form = new FormData();
        form.append('title', title);
        form.append('description', description || '');
        form.append('pdf', file);

        const token = getAdminToken();
        if (!token) return setUploadError('Önce admin giriş yapmalısın.');

        const res = await fetch(apiUrl('/api/admin/reels'), {
          method: 'POST',
          headers: { Authorization: `Bearer ${token}` },
          body: form
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) return setUploadError(data.error || 'Yükleme başarısız');

        setUploadOk('Yüklendi! Ana sayfadan görebilirsin.');
        document.getElementById('title').value = '';
        document.getElementById('description').value = '';
        document.getElementById('pdf').value = '';
      } catch (e) {
        setUploadError('Sunucuya bağlanılamadı.');
      }
    }

    (function boot() {
      const token = getAdminToken();
      if (token) {
        document.getElementById('login-area').style.display = 'none';
        document.getElementById('upload-area').style.display = 'block';
        document.getElementById('list-card').style.display = 'block';
        refreshReels();
      }
    })();
  </script>
</body>
</html>
